<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', Arial, sans-serif;
            background: #f0f4f8;
            color: #2d3748;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card-login {
            background: #ffffff;
            max-width: 400px;
            width: 100%;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #1a202c;
        }

        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
            margin-bottom: 20px;
        }

        .campo label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4a5568;
        }

        /* Container que alinha o input e o botão do olhinho */
        .input-senha-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 12px;
            padding-right: 45px; /* Espaço para o botão não cobrir o texto */
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            background-color: #ffffff;
        }

        input:focus {
            outline: none;
            border-color: #4a5568;
        }

        /* O botão do olhinho propriamente dito */
        .btn-mostrar-senha {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #718096;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none; /* Impede que o usuário selecione o emoji */
        }

        .btn-mostrar-senha:hover {
            color: #2d3748;
        }

        .btn-entrar {
            width: 100%;
            padding: 12px;
            background: #1a202c;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-entrar:hover {
            background: #2d3748;
        }

        .erro-msg {
            color: #e53e3e;
            font-size: 0.85rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .btn-voltar {
            display: inline-block;
            margin-top: 15px;
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .btn-voltar:hover {
            color: #718096;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card-login">
    <h2>🔒 Login Administrativo</h2>

    {% if erro %}
        <p class="erro-msg">❌ Senha incorreta! Tente novamente.</p>
    {% endif %}

    <form action="/admin" method="POST">
        <div class="campo">
            <label for="password">Digite a Senha de Acesso</label>
            <div class="input-senha-container">
                <input type="password" id="password" name="senha" required placeholder="Sua senha...">
                <button type="button" class="btn-mostrar-senha" id="togglePassword" title="Mostrar/Esconder senha">
                    👁️
                </button>
            </div>
        </div>

        <button type="submit" class="btn-entrar">🔓 Entrar no Painel</button>
    </form>

    <a href="/" class="btn-voltar">⬅ Voltar para a Rifa</a>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const togglePasswordButton = document.getElementById('togglePassword');

    togglePasswordButton.addEventListener('click', function () {
        // Se for password, muda para text (mostra). Se for text, muda para password (esconde).
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            togglePasswordButton.textContent = '🙈'; // Muda o emoji para o macaquinho tapando os olhos
        } else {
            passwordInput.type = 'password';
            togglePasswordButton.textContent = '👁️'; // Volta para o olhinho normal
        }
    }); 
</script>

</body>
</html>
