<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', Arial, sans-serif;
            background: #1a202c;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #2d3748;
            border-radius: 16px;
            padding: 40px 36px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        .icone { font-size: 3rem; margin-bottom: 12px; }

        h2 {
            color: #e2e8f0;
            font-size: 1.4rem;
            margin-bottom: 28px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: #1a202c;
            border: 2px solid #4a5568;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #68d391;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #38a169;
            color: #fff;
            font-size: 1rem;
            font-weight: 900;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2f855a; }

        .erro {
            background: #fc8181;
            color: #742a2a;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .voltar {
            display: block;
            margin-top: 18px;
            color: #718096;
            text-decoration: none;
            font-size: 0.88rem;
        }
        .voltar:hover { color: #a0aec0; }
    </style>
</head>
<body>

<div class="card">
    <div class="icone">🔐</div>
    <h2>Painel Administrativo</h2>

    {% if erro %}
        <div class="erro">{{ erro }}</div>
    {% endif %}

    <form method="POST">
        <input
            type="password"
            name="senha"
            placeholder="Digite a senha"
            autofocus
            required>

        <button type="submit">Entrar</button>
    </form>

    <a href="/" class="voltar">← Voltar para a rifa</a>
</div>

</body>
</html>
