<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Número {{ numero_id }}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7fafc;
            color: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #2b6cb0;
            margin-top: 0;
            text-align: center;
        }
        .info-numero {
            background: #ebf8ff;
            color: #2b6cb0;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }
        input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }
        .btn-submit {
            background: #48bb78;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: #38a169;
        }
        .btn-voltar {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #718096;
            text-decoration: none;
            font-size: 0.9em;
        }
        .btn-voltar:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Confirmar Reserva</h2>
        <div class="info-numero">Número Escolhido: {{ numero_id }}</div>
        
        <form action="/reservar" method="POST">
            <input type="hidden" name="numero_id" value="{{ numero_id }}">
            
            <div class="form-group">
                <label for="nome">Seu Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
            </div>
            
            <div class="form-group">
                <label for="fone">Seu Telefone / WhatsApp:</label>
                <input type="tel" id="fone" name="fone" placeholder="Ex: (11) 99999-9999" required>
            </div>
            
            <button type="submit" class="btn-submit">Finalizar Reserva</button>
        </form>
        
        <a href="/" class="btn-voltar">Voltar para a página inicial</a>
    </div>

</body>
</html>
